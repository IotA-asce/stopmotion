name: stop_motion
description: Offline-first stop-motion capture and editing for Android and iOS.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.12.2 <4.0.0'
  flutter: '>=3.44.6'

dependencies:
  camera: ^0.12.0+2
  cupertino_icons: ^1.0.8
  drift: ^2.34.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  image: ^4.9.1
  image_picker: ^1.2.3
  path: ^1.9.1
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  wakelock_plus: ^1.6.1

dev_dependencies:
  build_runner: ^2.15.1
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
