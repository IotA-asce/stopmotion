name: Publish Test APK

on:
  push:
    tags:
      - 'V*'

permissions:
  contents: write

concurrency:
  group: test-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-test-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
      - name: Package test APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk \
            "dist/stop-motion-${GITHUB_REF_NAME}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: stop-motion-${{ github.ref_name }}-apk
          path: dist/stop-motion-${{ github.ref_name }}.apk
          if-no-files-found: error
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/stop-motion-${GITHUB_REF_NAME}.apk" \
            --prerelease \
            --title "$GITHUB_REF_NAME test APK" \
            --notes "Installable Android debug APK for tester use. This is not a production release."
