name: Publish Test APK

on:
  push:
    tags:
      - 'V*'

permissions:
  contents: write

concurrency:
  group: test-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-test-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - name: Package test APKs
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "dist/stop-motion-${GITHUB_REF_NAME}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "dist/stop-motion-${GITHUB_REF_NAME}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "dist/stop-motion-${GITHUB_REF_NAME}-x86_64.apk"
      - name: Verify APK signatures and checksums
        run: |
          apksigner="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner"
          for apk in dist/*.apk; do
            "$apksigner" verify --verbose "$apk"
          done
          cd dist
          sha256sum *.apk > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: stop-motion-${{ github.ref_name }}-apks
          path: dist/
          if-no-files-found: error
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.apk \
            dist/SHA256SUMS.txt \
            --prerelease \
            --title "$GITHUB_REF_NAME test APKs" \
            --notes "Installable Android test APKs. Most phones use arm64-v8a; older 32-bit phones use armeabi-v7a; Android emulators may use x86_64. These are test-signed, not production releases."
